name: HomeWork_81

on: [push]

jobs:


  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0

        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}


      - name: Add SSH key to agent
        run: ssh-add -l

      - name: Join to server
        run: ssh -v -o StrictHostKeyChecking=no wioswa@158.160.10.91